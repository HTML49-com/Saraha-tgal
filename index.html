<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحقيق مع النونوس</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fce4ec;
            font-family: 'Tajawal', 'Arial', sans-serif;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px 20px;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        #bear {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h2 { 
            color: #d81b60; 
            font-size: 22px; 
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .buttons { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        button {
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-yes { background-color: #e91e63; color: white; }
        .btn-no { background-color: #f48fb1; color: white; }
        .btn-next { background-color: #4caf50; color: white; }
        .btn-back { background-color: #9e9e9e; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="bear">🧸</div>
    <h2 id="text-display"></h2>
    <div id="buttons-container" class="buttons">
        </div>
</div>

<script>
    // الأسئلة والأجوبة اللي طلبتي
    const scenarios = [
        {
            question: "واش باقة تعطلي عليا ف فري فاير؟",
            btnYes: "اه",
            btnNo: "لا",
            ansYes: "غادي نبلوكيك مك شي نهاااار",
            ansNo: "اييه دابة نشوفو 🖕🏻",
            emojiYes: "",
            emojiNo: ""
        },
        {
            question: "واش باقة تسلمي على ولد خالك و تسمعي لخالتي بهيجة؟",
            btnYes: "اه",
            btnNo: "لا",
            ansYes: "سيري***",
            ansNo: "تبتي خااالتك 🖕🏻",
            emojiYes: "🤬",
            emojiNo: ""
        },
        {
            question: "كتبغيني؟",
            btnYes: "اه",
            btnNo: "لا",
            ansYes: "بغي ولد خالتك 🖕🏻🖕🏻",
            ansNo: "أصلا كنت عارف 💔",
            emojiYes: "",
            emojiNo: "💔"
        }, 
        {
            question: "واش عمرك غتفكري تلوحي هاد النونوس؟",
            btnYes: "اه",
            btnNo: "لا",
            ansYes: "عارفك غدارة ما فيك ثقة! 😂",
            ansNo: "نشوفو هاد الوفاء فين غيوصلنا.. 🧸",
            emojiYes: "🐍",
            emojiNo: "🥰"
        }

    ];

    let currentIndex = 0;
    
    const bearEl = document.getElementById('bear');
    const textEl = document.getElementById('text-display');
    const buttonsContainer = document.getElementById('buttons-container');

    // دالة باش نبينو السؤال
    function showQuestion() {
        const currentData = scenarios[currentIndex];
        bearEl.innerText = "🫵🏻";
        textEl.innerText = currentData.question;
        
        buttonsContainer.innerHTML = `
            <button class="btn-yes" onclick="showAnswer(true)">${currentData.btnYes}</button>
            <button class="btn-no" onclick="showAnswer(false)">${currentData.btnNo}</button>
        `;
    }

    // دالة باش نبينو الجواب على حساب الاختيار
    function showAnswer(isYes) {
        const currentData = scenarios[currentIndex];
        bearEl.innerText = isYes ? currentData.emojiYes : currentData.emojiNo;
        textEl.innerText = isYes ? currentData.ansYes : currentData.ansNo;

        let nextActionHtml = "";
        
        // واش باقي شي سؤال ولا سالينا؟
        if (currentIndex < scenarios.length - 1) {
            nextActionHtml = `<button class="btn-next" onclick="nextQuestion()">السؤال الجاي</button>`;
        } else {
            nextActionHtml = `<button class="btn-next" onclick="resetGame()">عاودي من الأول</button>`;
        }

        // زر الرجوع باش تجرب الجواب لاخر
        buttonsContainer.innerHTML = `
            ${nextActionHtml}
            <button class="btn-back" onclick="showQuestion()">رجوع </button>
        `;
    }

    function nextQuestion() {
        currentIndex++;
        showQuestion();
    }

    function resetGame() {
        currentIndex = 0;
        showQuestion();
    }

    // بداية السكريبت
    showQuestion();
</script>

</body>
</html>
